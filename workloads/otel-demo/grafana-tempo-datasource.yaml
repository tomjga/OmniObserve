# kube-prometheus-stack's Grafana sidecar auto-imports ConfigMaps labelled
# grafana_datasource=1. This adds Tempo so traces are explorable next to metrics.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-tempo-datasource
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  tempo-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo:3100
        uid: tempo
