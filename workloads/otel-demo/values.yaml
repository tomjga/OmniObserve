# Helm values for the OpenTelemetry Demo (open-telemetry/opentelemetry-demo),
# wired to route ALL telemetry into OmniObserve's collector instead of the demo's
# own bundled stack.
#
# Verify the keys against your chart version first:
#   helm show values open-telemetry/opentelemetry-demo | less
# (Subchart toggle names occasionally change between releases.)

# Disable the demo's bundled observability — we use OmniObserve's collector + LGTM.
opentelemetry-collector:
  enabled: false
jaeger:
  enabled: false
prometheus:
  enabled: false
grafana:
  enabled: false
opensearch:
  enabled: false

# Point every instrumented service at OmniObserve's collector. envOverrides does an
# upsert (merge-by-name) over the chart's per-service env, so OUR endpoint wins — the
# "hides previous definition" apply-warnings are cosmetic; the effective value is ours.
default:
  envOverrides:
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: http://otelcol.monitoring.svc.cluster.local:4317

# Disable the built-in load generator (locust). It hammers the frontend continuously
# and pegged the 4-vCPU node hard enough to starve the kube-apiserver (TLS handshake
# timeouts). For Phase 2 we want *deliberate* faults (flagd flags) + on-demand load,
# not constant background traffic.
components:
  load-generator:
    enabled: false
