{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "api-service.fullname" . }}
  labels:
    {{- include "api-service.labels" . | nindent 4 }}
spec:
  # jobLabel reads this label off the Service, so Prometheus sets job="api-service"
  # (the value of app.kubernetes.io/name) — which the slo/ queries select on.
  jobLabel: app.kubernetes.io/name
  selector:
    matchLabels:
      {{- include "api-service.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval }}
{{- end }}
