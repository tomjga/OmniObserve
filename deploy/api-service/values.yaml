replicaCount: 1

image:
  repository: ghcr.io/tomjga/omniobserve-api-service
  tag: "" # defaults to .Chart.appVersion
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

otel:
  # OTEL_EXPORTER_OTLP_ENDPOINT for the OTel SDK (OTLP/gRPC, insecure in-cluster).
  endpoint: "http://otelcol:4317"

serviceMonitor:
  # Requires the Prometheus Operator (kube-prometheus-stack). jobLabel below makes
  # Prometheus emit job="api-service", which the SLO queries (slo/) select on.
  enabled: true
  interval: 15s

alerts:
  # A PrometheusRule whose error-rate alert opts into auto-remediation by carrying
  # the remediateLabel — the remediator's AlertmanagerConfig routes on it.
  enabled: true
  errorRatioThreshold: 0.1 # fire when 5xx ratio exceeds 10%
  for: 1m
  remediateLabel: omniobserve_remediate

rollout:
  # When true, render an Argo Rollout (canary) instead of a Deployment.
  # Requires the Argo Rollouts controller + CRDs (see ../../argo-rollouts/).
  enabled: false
  steps:
    - setWeight: 25
    - pause: { duration: 30s }
    - setWeight: 50
    - pause: { duration: 30s }
    - setWeight: 100
  analysis:
    interval: 30s
    failureLimit: 2 # consecutive failed checks tolerated before abort
    errorRatioThreshold: 0.05 # abort if 5xx ratio >= 5%
    prometheusAddress: http://prometheus-operated.monitoring:9090

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 128Mi
