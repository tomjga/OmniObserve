replicaCount: 1

image:
  repository: ghcr.io/tomjga/omniobserve-api-service
  tag: "" # defaults to .Chart.appVersion
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

otel:
  # OTEL_EXPORTER_OTLP_ENDPOINT for the OTel SDK (OTLP/gRPC, insecure in-cluster).
  endpoint: "http://otelcol:4317"

serviceMonitor:
  # Requires the Prometheus Operator (kube-prometheus-stack). jobLabel below makes
  # Prometheus emit job="api-service", which the SLO queries (slo/) select on.
  enabled: true
  interval: 15s

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 128Mi
