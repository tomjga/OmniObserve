replicaCount: 1

image:
  repository: ghcr.io/tomjga/omniobserve-remediator
  tag: "" # defaults to .Chart.appVersion
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

otel:
  # OTEL_EXPORTER_OTLP_ENDPOINT for the OTel SDK (OTLP/gRPC, insecure in-cluster).
  endpoint: "http://otelcol:4317"

serviceMonitor:
  # Requires the Prometheus Operator. jobLabel makes Prometheus emit job="remediator".
  enabled: true
  interval: 15s

alerting:
  # Render an AlertmanagerConfig that routes opt-in alerts to this webhook. Alerts opt
  # in by carrying the matchLabel set to "true" (see the api-service PrometheusRule).
  enabled: true
  matchLabel: omniobserve_remediate

auth:
  # Optional webhook bearer auth. When enabled, Alertmanager sends Authorization: Bearer
  # from this Secret key and the remediator requires the same token on POST /webhook.
  enabled: false
  secretName: remediator-webhook-auth
  secretKey: token

approval:
  auth:
    # Optional bearer auth for GET /approvals and POST /approvals/:id/(approve|deny).
    # Keep this distinct from Alertmanager's webhook token; humans/tools approve changes.
    enabled: false
    secretName: remediator-approval-auth
    secretKey: token

stop:
  # Global stop switch: route/observe alerts but do not mutate state. Useful during demos
  # and as the production "big red button" pattern.
  enabled: false

autonomy:
  # Global ceiling for catalog policies. Less-autonomous values here override more-autonomous
  # catalog entries; safer catalog entries still win over this default.
  # Valid: observe, suggest, approval, auto, auto-with-verify.
  mode: auto-with-verify

# The bounded action: disable a flagd feature flag named in the alert's
# remediation_flag annotation. flagd lives in another namespace, so we render a
# ServiceAccount + a Role/RoleBinding (in flagd.namespace) scoped to that one ConfigMap.
flagd:
  namespace: otel-demo
  configMap: flagd-config
  configKey: demo.flagd.json

# dryRun=false makes the loop actually heal (disabling a fault flag is the safest
# possible mutation — reversible, scoped). Set true to observe what it WOULD do.
dryRun: false
# Per-incident cooldown: don't act twice on the same incident within this window.
cooldownSeconds: 300

# Repeated already-safe outcomes mean the loop has no useful state transition left. Escalate
# them as needs_human after this many repeats within the window.
noopStorm:
  threshold: 3
  windowSeconds: 900

# After a real action, sample Prometheus before/after and record whether the signal improved.
verification:
  delaySeconds: 30
  sampleTimeoutSeconds: 3

catalog:
  mountPath: /etc/remediator/fault-catalog.json

networkPolicy:
  enabled: false
  # This profile is intentionally conservative and assumes remediator, Alertmanager,
  # Prometheus, Grafana, and the OTel Collector live in the same namespace.
  allowSameNamespaceIngress: true
  allowSameNamespaceEgress: true
  allowDNS: true
  allowExternalHTTPS: true

rbac:
  # Create the ServiceAccount + Role/RoleBinding that let the remediator patch flagd.
  create: true

# RCA copilot: on a remediation, draft a grounded RCA and publish it. All non-secret
# config is here; secrets (LLM_API_KEY, GRAFANA_TOKEN, GITHUB_TOKEN) come from an existing
# Secret named below — NOT created by this chart and NOT committed. See rca-secret.example.yaml.
# The copilot degrades gracefully: with no LLM key it stays disabled and the loop is action-only.
rca:
  enabled: true
  # Bound LLM/RCA fan-out during alert storms. The webhook stays fast; excess drafts are
  # dropped and counted rather than creating unbounded goroutines.
  workers: 2
  queueDepth: 20
  secretName: remediator-rca
  llm:
    baseURL: "" # e.g. https://generativelanguage.googleapis.com/v1beta/openai (vendor-agnostic)
    model: "" # e.g. gemini-2.0-flash, gpt-4o, llama3.1
  prometheusURL: "http://kps-kube-prometheus-stack-prometheus.monitoring:9090"
  grafanaURL: "http://kps-grafana.monitoring"
  github:
    repo: "tomjga/OmniObserve" # owner/name — where RCA issues + corpus drafts land (needs GITHUB_TOKEN)
    draftsBranch: "rca-drafts"

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi
