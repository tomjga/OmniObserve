apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "remediator.fullname" . }}
  labels:
    {{- include "remediator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "remediator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "remediator.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.rbac.create }}
      serviceAccountName: {{ include "remediator.fullname" . }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: remediator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            - name: REMEDIATOR_DRY_RUN
              value: {{ .Values.dryRun | quote }}
            - name: REMEDIATOR_STOP
              value: {{ .Values.stop.enabled | quote }}
            - name: REMEDIATOR_AUTONOMY_MODE
              value: {{ .Values.autonomy.mode | quote }}
            - name: REMEDIATION_CATALOG_PATH
              value: {{ .Values.catalog.mountPath | quote }}
            - name: FLAGD_NAMESPACE
              value: {{ .Values.flagd.namespace | quote }}
            - name: FLAGD_CONFIGMAP
              value: {{ .Values.flagd.configMap | quote }}
            - name: FLAGD_CONFIG_KEY
              value: {{ .Values.flagd.configKey | quote }}
            - name: REMEDIATOR_COOLDOWN_SECONDS
              value: {{ .Values.cooldownSeconds | quote }}
            - name: REMEDIATOR_NOOP_STORM_THRESHOLD
              value: {{ .Values.noopStorm.threshold | quote }}
            - name: REMEDIATOR_NOOP_STORM_WINDOW_SECONDS
              value: {{ .Values.noopStorm.windowSeconds | quote }}
            - name: REMEDIATOR_VERIFY_DELAY_SECONDS
              value: {{ .Values.verification.delaySeconds | quote }}
            - name: REMEDIATOR_VERIFY_SAMPLE_TIMEOUT_SECONDS
              value: {{ .Values.verification.sampleTimeoutSeconds | quote }}
            - name: PROMETHEUS_URL
              value: {{ .Values.rca.prometheusURL | quote }}
            {{- if .Values.auth.enabled }}
            - name: WEBHOOK_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.secretName }}
                  key: {{ .Values.auth.secretKey }}
            {{- end }}
            {{- if .Values.approval.auth.enabled }}
            - name: APPROVAL_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.approval.auth.secretName }}
                  key: {{ .Values.approval.auth.secretKey }}
            {{- end }}
            {{- if .Values.rca.enabled }}
            # RCA copilot — non-secret config from values, secrets from .Values.rca.secretName
            # (optional: missing keys just leave the copilot/sinks disabled).
            - name: LLM_BASE_URL
              value: {{ .Values.rca.llm.baseURL | quote }}
            - name: LLM_MODEL
              value: {{ .Values.rca.llm.model | quote }}
            - name: RCA_WORKERS
              value: {{ .Values.rca.workers | quote }}
            - name: RCA_QUEUE_DEPTH
              value: {{ .Values.rca.queueDepth | quote }}
            - name: GRAFANA_URL
              value: {{ .Values.rca.grafanaURL | quote }}
            - name: GITHUB_REPO
              value: {{ .Values.rca.github.repo | quote }}
            - name: RCA_DRAFTS_BRANCH
              value: {{ .Values.rca.github.draftsBranch | quote }}
            - name: CORPUS_DIR
              value: /app/incidents
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.rca.secretName }}
                  key: LLM_API_KEY
                  optional: true
            - name: GRAFANA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.rca.secretName }}
                  key: GRAFANA_TOKEN
                  optional: true
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.rca.secretName }}
                  key: GITHUB_TOKEN
                  optional: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: fault-catalog
              mountPath: {{ .Values.catalog.mountPath }}
              subPath: fault-catalog.json
              readOnly: true
      volumes:
        - name: fault-catalog
          configMap:
            name: {{ include "remediator.fullname" . }}-catalog
