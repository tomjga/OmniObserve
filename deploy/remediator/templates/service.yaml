apiVersion: v1
kind: Service
metadata:
  name: {{ include "remediator.fullname" . }}
  labels:
    {{- include "remediator.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
  selector:
    {{- include "remediator.selectorLabels" . | nindent 4 }}
