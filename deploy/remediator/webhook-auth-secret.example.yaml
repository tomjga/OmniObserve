# Optional webhook auth secret — COPY to webhook-auth-secret.yaml (gitignored), fill token,
# apply it, then set auth.enabled=true in the remediator chart.
apiVersion: v1
kind: Secret
metadata:
  name: remediator-webhook-auth
  namespace: monitoring
type: Opaque
stringData:
  token: "REPLACE_ME_WITH_A_RANDOM_BEARER_TOKEN"
