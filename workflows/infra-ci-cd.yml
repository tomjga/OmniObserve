name: Infra CI/CD (Terraform Plan on PR, Apply on Push)

# Trigger on any change under infrastructure/**
on:
  pull_request:
    branches:
      - main
    paths:
      - 'infrastructure/**'
  push:
    branches:
      - main
    paths:
      - 'infrastructure/**'

env:
  TF_VERSION: 1.6.6

jobs:
  #────────────────────────────────────────────────────────
  # Job: Terraform Plan (only on PR)
  #────────────────────────────────────────────────────────
  terraform_pr:
    name: Terraform Plan (AWS & Azure)
    runs-on: self-hosted
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        cloud: [aws, azure]

    defaults:
      run:
        working-directory: ./infrastructure/${{ matrix.cloud }}

    steps:
      # 1) Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2) Setup Terraform CLI
      - name: Set up Terraform CLI
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # 3) Login to cloud (conditioned by matrix.cloud)
      - name: Configure AWS credentials
        if: matrix.cloud == 'aws'
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Azure Login
        if: matrix.cloud == 'azure'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 4) Terraform Init
      - name: Terraform Init
        run: terraform init

      # 5) Terraform Validate
      - name: Terraform Validate
        run: terraform validate

      # 6) Terraform Plan (output to file so logs are persisted)
      - name: Terraform Plan
        run: terraform plan -out=tfplan

      # 7) Upload plan as artifact (so reviewers can download/view)
      - name: Upload tfplan artifact
        uses: actions/upload-artifact@v3
        with:
          name: tfplan-${{ matrix.cloud }}
          path: ./tfplan

  #────────────────────────────────────────────────────────
  # Job: Terraform Apply (only on push to main)
  #────────────────────────────────────────────────────────
  terraform_apply:
    name: Terraform Apply (AWS & Azure)
    runs-on: self-hosted
    needs: terraform_pr   # ensure plan job completes (even if PR, for logs)
    if: github.event_name == 'push'
    strategy:
      matrix:
        cloud: [aws, azure]

    defaults:
      run:
        working-directory: ./infrastructure/${{ matrix.cloud }}

    steps:
      # 1) Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2) Setup Terraform CLI
      - name: Set up Terraform CLI
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # 3) Login to cloud
      - name: Configure AWS credentials
        if: matrix.cloud == 'aws'
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Azure Login
        if: matrix.cloud == 'azure'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 4) Terraform Init
      - name: Terraform Init
        run: terraform init

      # 5) Terraform Validate
      - name: Terraform Validate
        run: terraform validate

      # 6) Terraform Plan (optional, but useful for logs)
      - name: Terraform Plan
        run: terraform plan -out=tfplan

      # 7) Terraform Apply
      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
