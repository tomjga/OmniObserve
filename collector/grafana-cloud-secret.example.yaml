# Grafana Cloud OTLP credentials for the collector's otlphttp/grafanacloud exporter.
# COPY to grafana-cloud-secret.yaml (gitignored), fill in, and apply:
#   cp collector/grafana-cloud-secret.example.yaml collector/grafana-cloud-secret.yaml
#   # edit values, then:
#   kubectl -n monitoring apply -f collector/grafana-cloud-secret.yaml
#   kubectl -n monitoring rollout restart deployment/otelcol
#
# Where to get the values (Grafana Cloud portal):
#   Connections -> Add new connection -> "OpenTelemetry (OTLP)" -> generate a token.
#   It shows two values; map them here:
#     OTEL_EXPORTER_OTLP_ENDPOINT  -> endpoint            (e.g. https://otlp-gateway-prod-<zone>.grafana.net/otlp)
#     OTEL_EXPORTER_OTLP_HEADERS   -> authorization       (the part AFTER "Authorization=", e.g. "Basic <base64>")
apiVersion: v1
kind: Secret
metadata:
  name: grafana-cloud-otlp
  namespace: monitoring
type: Opaque
stringData:
  endpoint: "https://otlp-gateway-prod-REPLACE.grafana.net/otlp"
  authorization: "Basic REPLACE_ME_BASE64"
