# OpenTelemetry Collector (contrib) — the vendor-neutral fan-out layer.
# Services emit a single OTLP stream here; this config routes each signal to the
# LGTM backends. Swapping a backend means editing only this file, never service code.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # Guardrail against unbounded memory use under load.
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 25
  batch: {}

exporters:
  # Always-on local visibility: prints a summary of every batch to collector logs.
  debug:
    verbosity: normal
  # Traces -> Tempo (OTLP/gRPC). In microservices mode the distributor is the
  # ingest entrypoint, so we target tempo-distributor, not a single "tempo" svc.
  otlp/tempo:
    endpoint: tempo-distributor:4317
    tls:
      insecure: true
  # Metrics -> kube-prometheus-stack Prometheus (needs enableRemoteWriteReceiver,
  # which bootstrap.sh sets). prometheus-operated is the Operator's headless service.
  prometheusremotewrite:
    endpoint: http://prometheus-operated:9090/api/v1/write
    tls:
      insecure: true
  # Logs -> Loki's native OTLP ingest endpoint (otlphttp appends /v1/logs).
  otlphttp/loki:
    endpoint: http://loki-gateway/otlp
  # Grafana Cloud (managed, shareable) — same OTLP stream, second destination. One gateway
  # ingests metrics+traces+logs. Endpoint + Basic auth come from the gitignored
  # grafana-cloud-otlp Secret (see grafana-cloud-secret.example.yaml), injected as env.
  otlphttp/grafanacloud:
    endpoint: ${env:GRAFANA_CLOUD_OTLP_ENDPOINT}
    headers:
      Authorization: ${env:GRAFANA_CLOUD_OTLP_AUTH}

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo, otlphttp/grafanacloud, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheusremotewrite, otlphttp/grafanacloud, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/loki, otlphttp/grafanacloud, debug]
