# OTel Collector for the cluster. The config comes from a ConfigMap created from
# collector/otelcol-config.yaml (single source of truth) — see bootstrap-telemetry.sh:
#   kubectl create configmap otelcol-config -n monitoring \
#     --from-file=config.yaml=collector/otelcol-config.yaml --dry-run=client -o yaml | kubectl apply -f -
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otelcol
  labels: { app: otelcol }
spec:
  replicas: 1
  selector:
    matchLabels: { app: otelcol }
  template:
    metadata:
      labels: { app: otelcol }
    spec:
      containers:
        - name: otelcol
          image: otel/opentelemetry-collector-contrib:0.153.0 # bump as needed
          args: ["--config=/etc/otelcol/config.yaml"]
          # Grafana Cloud OTLP credentials for the otlphttp/grafanacloud exporter. From the
          # gitignored grafana-cloud-otlp Secret; bootstrap seeds a harmless placeholder when
          # absent so the collector still runs (cloud exports just fail-and-retry, locally OK).
          env:
            - name: GRAFANA_CLOUD_OTLP_ENDPOINT
              valueFrom: { secretKeyRef: { name: grafana-cloud-otlp, key: endpoint } }
            - name: GRAFANA_CLOUD_OTLP_AUTH
              valueFrom: { secretKeyRef: { name: grafana-cloud-otlp, key: authorization } }
          ports:
            - { name: otlp-grpc, containerPort: 4317 }
            - { name: otlp-http, containerPort: 4318 }
          volumeMounts:
            - { name: config, mountPath: /etc/otelcol }
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
      volumes:
        - name: config
          configMap: { name: otelcol-config }
---
apiVersion: v1
kind: Service
metadata:
  name: otelcol
  labels: { app: otelcol }
spec:
  selector: { app: otelcol }
  ports:
    - { name: otlp-grpc, port: 4317, targetPort: 4317 }
    - { name: otlp-http, port: 4318, targetPort: 4318 }
