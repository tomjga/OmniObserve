name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

env:
  # otelgin + OTel contrib require Go 1.25; setup-go resolves to the latest 1.25.x
  # patch, which carries the stdlib security fixes govulncheck checks for.
  GO_VERSION: "1.25"

jobs:
  test:
    name: Test & vet
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: application
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: application/go.sum
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race -coverprofile=coverage.out ./...
      - run: go tool cover -func=coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: application

  govulncheck:
    name: Go vulnerabilities
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: application
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

  trivy:
    name: Trivy (deps + secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan filesystem for vulnerable deps and leaked secrets
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  slo:
    name: SLO rules in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go install github.com/slok/sloth/cmd/sloth@latest
      - name: Regenerate and fail on drift
        run: |
          sloth generate -i slo/api-service.slo.yaml -o slo/api-service.rules.yaml
          git diff --exit-code -- slo/api-service.rules.yaml \
            || { echo "::error::slo/api-service.rules.yaml is out of date — run 'sloth generate'"; exit 1; }

  helm:
    name: Helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint deploy/api-service
      - run: helm template api-service deploy/api-service > /dev/null
