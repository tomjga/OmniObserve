name: Release image

# Build, attest (SBOM + provenance), sign (cosign keyless), and scan the image.
# Runs on main and on demand — not on PRs, since signing requires a registry push.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write # push to GHCR
  id-token: write # cosign keyless (OIDC)

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/omniobserve-api-service

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push (with SBOM + provenance attestations)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: application
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        run: cosign sign --yes "${IMAGE}@${{ steps.build.outputs.digest }}"

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
