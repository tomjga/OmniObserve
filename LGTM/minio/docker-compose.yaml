version: '3'
services:
  minio:
    image: quay.io/minio/minio  
    container_name: minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data:/data
    # Root credentials come from .env (gitignored). See .env.example.
    # Defaults keep local dev working out of the box with MinIO's well-known
    # defaults; override them in .env for anything you care about.
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    command: server /data --console-address ":9001"